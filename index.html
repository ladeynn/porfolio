<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laura's Porfolio</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background-color: #f4f4f4; }
        header { text-align: center; padding: 50px 20px; background: white; }
        h1 { margin: 0; font-weight: 300; letter-spacing: 2px; }
        
        /* Estilo de la galería */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .artwork { width: 100%; height: auto; display: block; }
        .artwork-container { background: white; padding: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <header>
        <h1>Laura</h1>
        <p>3D modeling | Enviroments | Concept Art</p>
    </header>

    <div class="gallery">
        <div class="artwork-container">
            <img src="ruta-de-tu-imagen-1.jpg" alt="Obra 1" class="artwork">
        </div>
        <div class="artwork-container">
            <img src="ruta-de-tu-imagen-2.jpg" alt="Obra 2" class="artwork">
        </div>
        </div>

</body>
</html>
